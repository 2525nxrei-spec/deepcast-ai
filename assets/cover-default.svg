<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1400" width="1400" height="1400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2997ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2997ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M 70 0 L 0 0 0 70" fill="none" stroke="#f5f5f7" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1400" fill="url(#bg)"/>
  <rect width="1400" height="1400" fill="url(#grid)"/>

  <!-- Central glow -->
  <ellipse cx="700" cy="580" rx="550" ry="400" fill="url(#glow)"/>

  <!-- Concentric rings -->
  <circle cx="700" cy="560" r="200" fill="none" stroke="#2997ff" stroke-width="0.6" stroke-opacity="0.08"/>
  <circle cx="700" cy="560" r="300" fill="none" stroke="#2997ff" stroke-width="0.5" stroke-opacity="0.06"/>
  <circle cx="700" cy="560" r="400" fill="none" stroke="#2997ff" stroke-width="0.5" stroke-opacity="0.04"/>
  <circle cx="700" cy="560" r="500" fill="none" stroke="#2997ff" stroke-width="0.4" stroke-opacity="0.02"/>

  <!-- Neural network nodes -->
  <g filter="url(#softglow)" opacity="0.35">
    <line x1="200" y1="300" x2="450" y2="450" stroke="#2997ff" stroke-width="0.8"/>
    <line x1="450" y1="450" x2="700" y2="350" stroke="#2997ff" stroke-width="0.8"/>
    <line x1="700" y1="350" x2="950" y2="450" stroke="#2997ff" stroke-width="0.8"/>
    <line x1="950" y1="450" x2="1200" y2="300" stroke="#2997ff" stroke-width="0.8"/>
    <line x1="300" y1="700" x2="500" y2="600" stroke="#2997ff" stroke-width="0.6" stroke-opacity="0.5"/>
    <line x1="1100" y1="700" x2="900" y2="600" stroke="#2997ff" stroke-width="0.6" stroke-opacity="0.5"/>
    <line x1="450" y1="450" x2="400" y2="650" stroke="#2997ff" stroke-width="0.6" stroke-opacity="0.4"/>
    <line x1="950" y1="450" x2="1000" y2="650" stroke="#2997ff" stroke-width="0.6" stroke-opacity="0.4"/>
    <circle cx="200" cy="300" r="4" fill="#2997ff" opacity="0.5"/>
    <circle cx="450" cy="450" r="5" fill="#2997ff" opacity="0.6"/>
    <circle cx="700" cy="350" r="7" fill="#2997ff" opacity="0.7"/>
    <circle cx="950" cy="450" r="5" fill="#2997ff" opacity="0.6"/>
    <circle cx="1200" cy="300" r="4" fill="#2997ff" opacity="0.5"/>
    <circle cx="300" cy="700" r="3" fill="#2997ff" opacity="0.3"/>
    <circle cx="1100" cy="700" r="3" fill="#2997ff" opacity="0.3"/>
    <circle cx="400" cy="650" r="3" fill="#2997ff" opacity="0.3"/>
    <circle cx="1000" cy="650" r="3" fill="#2997ff" opacity="0.3"/>
  </g>

  <!-- Logo Mark - larger for default -->
  <g transform="translate(700, 520)">
    <circle cx="0" cy="0" r="130" fill="#0a0a0f" stroke="#f5f5f7" stroke-width="2" stroke-opacity="0.12"/>
    <text x="0" y="48" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="160" font-weight="700" fill="#f5f5f7">D</text>
    <circle cx="80" cy="-58" r="24" fill="#2997ff"/>
  </g>

  <!-- Podcast name -->
  <text x="700" y="740" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="600" fill="#f5f5f7" letter-spacing="8">DEEPCAST AI</text>

  <!-- Separator -->
  <line x1="480" y1="790" x2="920" y2="790" stroke="#2997ff" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Tagline -->
  <text x="700" y="860" text-anchor="middle" font-family="'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif" font-size="34" font-weight="400" fill="#f5f5f7" opacity="0.6">AIが生み出す、5分間の深い洞察</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="1370" width="1400" height="30" fill="#2997ff" opacity="0.8"/>

  <!-- Corner decorations -->
  <path d="M 60 60 L 60 130 M 60 60 L 130 60" stroke="#f5f5f7" stroke-width="1" stroke-opacity="0.08"/>
  <path d="M 1340 60 L 1340 130 M 1340 60 L 1270 60" stroke="#f5f5f7" stroke-width="1" stroke-opacity="0.08"/>
  <path d="M 60 1340 L 60 1270 M 60 1340 L 130 1340" stroke="#f5f5f7" stroke-width="1" stroke-opacity="0.08"/>
  <path d="M 1340 1340 L 1340 1270 M 1340 1340 L 1270 1340" stroke="#f5f5f7" stroke-width="1" stroke-opacity="0.08"/>
</svg>