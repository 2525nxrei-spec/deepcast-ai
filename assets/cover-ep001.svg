<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1400" width="1400" height="1400">
  <defs>
    <!-- Dark gradient background -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <!-- Accent glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2997ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2997ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Grid pattern for subtle tech feel -->
    <pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M 70 0 L 0 0 0 70" fill="none" stroke="#f5f5f7" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>
    <!-- Node connection line style -->
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1400" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1400" height="1400" fill="url(#grid)"/>

  <!-- Subtle glow behind logo area -->
  <ellipse cx="700" cy="380" rx="500" ry="350" fill="url(#glow)"/>

  <!-- Abstract geometric elements - neural network nodes -->
  <g filter="url(#softglow)" opacity="0.4">
    <!-- Connection lines -->
    <line x1="180" y1="250" x2="420" y2="380" stroke="#2997ff" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="420" y1="380" x2="700" y2="300" stroke="#2997ff" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="700" y1="300" x2="980" y2="380" stroke="#2997ff" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="980" y1="380" x2="1220" y2="250" stroke="#2997ff" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="420" y1="380" x2="350" y2="550" stroke="#2997ff" stroke-width="0.8" stroke-opacity="0.2"/>
    <line x1="980" y1="380" x2="1050" y2="550" stroke="#2997ff" stroke-width="0.8" stroke-opacity="0.2"/>
    <line x1="700" y1="300" x2="700" y2="500" stroke="#2997ff" stroke-width="0.8" stroke-opacity="0.2"/>
    <!-- Nodes -->
    <circle cx="180" cy="250" r="4" fill="#2997ff" opacity="0.5"/>
    <circle cx="420" cy="380" r="5" fill="#2997ff" opacity="0.6"/>
    <circle cx="700" cy="300" r="6" fill="#2997ff" opacity="0.7"/>
    <circle cx="980" cy="380" r="5" fill="#2997ff" opacity="0.6"/>
    <circle cx="1220" cy="250" r="4" fill="#2997ff" opacity="0.5"/>
    <circle cx="350" cy="550" r="3" fill="#2997ff" opacity="0.3"/>
    <circle cx="1050" cy="550" r="3" fill="#2997ff" opacity="0.3"/>
    <circle cx="700" cy="500" r="3.5" fill="#2997ff" opacity="0.35"/>
  </g>

  <!-- Decorative circles - concentric rings -->
  <circle cx="700" cy="420" r="180" fill="none" stroke="#2997ff" stroke-width="0.5" stroke-opacity="0.08"/>
  <circle cx="700" cy="420" r="260" fill="none" stroke="#2997ff" stroke-width="0.5" stroke-opacity="0.05"/>
  <circle cx="700" cy="420" r="340" fill="none" stroke="#2997ff" stroke-width="0.5" stroke-opacity="0.03"/>

  <!-- DeepCast AI Logo Mark -->
  <g transform="translate(700, 420)">
    <!-- Logo background circle -->
    <circle cx="0" cy="0" r="100" fill="#0a0a0f" stroke="#f5f5f7" stroke-width="1.5" stroke-opacity="0.15"/>
    <!-- D letter -->
    <text x="0" y="35" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="120" font-weight="700" fill="#f5f5f7">D</text>
    <!-- Blue accent dot -->
    <circle cx="62" cy="-45" r="18" fill="#2997ff"/>
  </g>

  <!-- Podcast name -->
  <text x="700" y="600" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="600" fill="#f5f5f7" letter-spacing="6">DEEPCAST AI</text>

  <!-- Thin separator line -->
  <line x1="500" y1="640" x2="900" y2="640" stroke="#2997ff" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Episode number -->
  <rect x="618" y="670" width="164" height="48" rx="24" fill="none" stroke="#2997ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="700" y="702" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="600" fill="#2997ff" letter-spacing="3">EPISODE #1</text>

  <!-- Episode title - Japanese text, broken into lines -->
  <text x="700" y="820" text-anchor="middle" font-family="'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif" font-size="48" font-weight="700" fill="#f5f5f7">
    <tspan x="700" dy="0">最適化された世界で</tspan>
    <tspan x="700" dy="68">つまずく権利</tspan>
  </text>

  <!-- Subtitle line -->
  <line x1="560" y1="975" x2="840" y2="975" stroke="#f5f5f7" stroke-width="0.5" stroke-opacity="0.2"/>

  <text x="700" y="1030" text-anchor="middle" font-family="'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif" font-size="30" font-weight="400" fill="#f5f5f7" opacity="0.6">
    <tspan x="700" dy="0">AGI時代の労働・アイデンティティ・</tspan>
    <tspan x="700" dy="46">生存戦略</tspan>
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="1370" width="1400" height="30" fill="#2997ff" opacity="0.8"/>

  <!-- Category tag bottom-left -->
  <text x="80" y="1340" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#f5f5f7" opacity="0.3" letter-spacing="2">SOCIETY &amp; CULTURE</text>

  <!-- Subtle corner decorations -->
  <path d="M 60 60 L 60 120 M 60 60 L 120 60" stroke="#f5f5f7" stroke-width="1" stroke-opacity="0.08"/>
  <path d="M 1340 60 L 1340 120 M 1340 60 L 1280 60" stroke="#f5f5f7" stroke-width="1" stroke-opacity="0.08"/>
  <path d="M 60 1340 L 60 1280 M 60 1340 L 120 1340" stroke="#f5f5f7" stroke-width="1" stroke-opacity="0.08"/>
  <path d="M 1340 1340 L 1340 1280 M 1340 1340 L 1280 1340" stroke="#f5f5f7" stroke-width="1" stroke-opacity="0.08"/>
</svg>