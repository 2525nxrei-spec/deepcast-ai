<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="35%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="25%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#2997ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#2997ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#f5f5f7" stroke-opacity="0.025" stroke-width="0.5"/>
    </pattern>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle neural net in background -->
  <g filter="url(#softglow)" opacity="0.25">
    <line x1="80" y1="120" x2="250" y2="230" stroke="#2997ff" stroke-width="0.7"/>
    <line x1="250" y1="230" x2="350" y2="180" stroke="#2997ff" stroke-width="0.7"/>
    <line x1="250" y1="230" x2="300" y2="380" stroke="#2997ff" stroke-width="0.6"/>
    <line x1="80" y1="500" x2="250" y2="400" stroke="#2997ff" stroke-width="0.6"/>
    <line x1="250" y1="400" x2="300" y2="380" stroke="#2997ff" stroke-width="0.6"/>
    <circle cx="80" cy="120" r="3" fill="#2997ff" opacity="0.5"/>
    <circle cx="250" cy="230" r="4" fill="#2997ff" opacity="0.6"/>
    <circle cx="350" cy="180" r="3" fill="#2997ff" opacity="0.4"/>
    <circle cx="300" cy="380" r="3.5" fill="#2997ff" opacity="0.5"/>
    <circle cx="80" cy="500" r="3" fill="#2997ff" opacity="0.4"/>
    <circle cx="250" cy="400" r="3" fill="#2997ff" opacity="0.4"/>
  </g>

  <!-- Concentric ring behind logo -->
  <circle cx="280" cy="290" r="120" fill="none" stroke="#2997ff" stroke-width="0.5" stroke-opacity="0.06"/>
  <circle cx="280" cy="290" r="180" fill="none" stroke="#2997ff" stroke-width="0.4" stroke-opacity="0.04"/>

  <!-- Logo Mark -->
  <g transform="translate(280, 270)">
    <circle cx="0" cy="0" r="80" fill="#0a0a0f" stroke="#f5f5f7" stroke-width="1.5" stroke-opacity="0.1"/>
    <text x="0" y="30" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="100" font-weight="700" fill="#f5f5f7">D</text>
    <circle cx="50" cy="-36" r="15" fill="#2997ff"/>
  </g>

  <!-- Podcast name -->
  <text x="280" y="420" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="600" fill="#f5f5f7" letter-spacing="5">DEEPCAST AI</text>

  <!-- Vertical separator line -->
  <line x1="520" y1="160" x2="520" y2="470" stroke="#2997ff" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Right side - Tagline -->
  <text x="580" y="270" font-family="'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif" font-size="44" font-weight="700" fill="#f5f5f7">AIが生み出す、</text>
  <text x="580" y="340" font-family="'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif" font-size="44" font-weight="700" fill="#f5f5f7">5分間の深い洞察</text>

  <!-- Sub-description -->
  <text x="580" y="410" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#f5f5f7" opacity="0.4" letter-spacing="2">AI-GENERATED DEEP INSIGHT PODCAST</text>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#2997ff" opacity="0.8"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="#2997ff" opacity="0.8"/>
</svg>