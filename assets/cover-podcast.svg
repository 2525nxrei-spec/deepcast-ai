<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2997ff"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="rgba(41,151,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(41,151,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <rect width="512" height="512" rx="64" fill="url(#glow)"/>
  <!-- Sound wave bars -->
  <g transform="translate(256,220)" opacity="0.6">
    <rect x="-100" y="-30" width="8" height="60" rx="4" fill="url(#accent)"/>
    <rect x="-80" y="-50" width="8" height="100" rx="4" fill="url(#accent)"/>
    <rect x="-60" y="-70" width="8" height="140" rx="4" fill="url(#accent)"/>
    <rect x="-40" y="-45" width="8" height="90" rx="4" fill="url(#accent)"/>
    <rect x="-20" y="-80" width="8" height="160" rx="4" fill="url(#accent)"/>
    <rect x="0" y="-60" width="8" height="120" rx="4" fill="url(#accent)"/>
    <rect x="20" y="-90" width="8" height="180" rx="4" fill="url(#accent)"/>
    <rect x="40" y="-55" width="8" height="110" rx="4" fill="url(#accent)"/>
    <rect x="60" y="-75" width="8" height="150" rx="4" fill="url(#accent)"/>
    <rect x="80" y="-40" width="8" height="80" rx="4" fill="url(#accent)"/>
    <rect x="100" y="-25" width="8" height="50" rx="4" fill="url(#accent)"/>
  </g>
  <!-- Logo text -->
  <text x="256" y="370" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="700" fill="#f5f5f7" letter-spacing="-1">DeepCast</text>
  <text x="256" y="405" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="500" fill="#2997ff" letter-spacing="6">AI PODCAST</text>
  <!-- Subtle circle accent -->
  <circle cx="256" cy="210" r="120" fill="none" stroke="rgba(99,102,241,0.12)" stroke-width="1"/>
  <circle cx="256" cy="210" r="140" fill="none" stroke="rgba(99,102,241,0.06)" stroke-width="1"/>
</svg>
